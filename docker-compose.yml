# CCD Orphanage Portal — local development
# PostgreSQL + Redis for Django backend

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orphanage_user
      POSTGRES_PASSWORD: orphanage_pass
      POSTGRES_DB: orphanage_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orphanage_user -d orphanage_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
