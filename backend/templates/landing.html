<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCD Orphanage Portal — City Centre Dawah</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">

    <!-- Primary Meta Tags -->
    <meta name="description" content="Expense management for CCD orphanages in Uganda, Gambia &amp; Indonesia">
    <meta name="theme-color" content="#982b2e">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site_url }}/">
    <meta property="og:title" content="CCD Orphanage Portal — City Centre Dawah">
    <meta property="og:description" content="Expense management for CCD orphanages in Uganda, Gambia &amp; Indonesia">
    <meta property="og:image" content="{{ site_url }}/static/img/og-card.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:site_name" content="City Centre Dawah">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CCD Orphanage Portal — City Centre Dawah">
    <meta name="twitter:description" content="Expense management for CCD orphanages in Uganda, Gambia &amp; Indonesia">
    <meta name="twitter:image" content="{{ site_url }}/static/img/og-card.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #982b2e;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .landing {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
        }
        .logo img {
            width: 100%;
            height: 100%;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 0.5rem;
        }
        .countries {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 2.5rem;
        }
        .cta {
            display: inline-block;
            padding: 0.85rem 2.5rem;
            background: white;
            color: #982b2e;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            transition: background 0.2s, transform 0.2s;
        }
        .cta:hover {
            background: #fdf2f2;
            transform: translateY(-1px);
        }
        .footer {
            margin-top: 3rem;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
        }
        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            .subtitle { font-size: 1rem; }
            .logo { width: 90px; height: 90px; }
        }
    </style>
</head>
<body>
    <div class="landing">
        <div class="logo">
            <img src="/static/img/ccd-logo-white.svg" alt="City Centre Dawah">
        </div>
        <h1>CCD Orphanage Portal</h1>
        <p class="subtitle">Expense management for CCD orphanages</p>
        <p class="countries">Uganda &middot; Gambia &middot; Indonesia</p>
        <a href="/admin/" class="cta">Go to Portal</a>
        <div class="footer">City Centre Dawah</div>
    </div>
</body>
</html>
