{% extends "admin/login.html" %}
{% load i18n %}

{% block extrastyle %}
{{ block.super }}
{% if google_login_url %}
<style>
  .google-login {
    margin: 1em 0;
    padding: 1em;
    background: #f8f9fa;
    border: 1px solid #dee2e6;
    border-radius: 4px;
    text-align: center;
  }
  .google-login a {
    display: inline-block;
    padding: 10px 24px;
    background: #4285f4;
    color: #fff;
    text-decoration: none;
    border-radius: 4px;
    font-weight: bold;
  }
  .google-login a:hover {
    background: #3367d6;
  }
  .google-login .divider {
    margin: 0.8em 0;
    color: #6c757d;
    font-size: 0.9em;
  }
</style>
{% endif %}
{% endblock %}

{% block content %}
{% if google_login_url %}
<div class="google-login">
  <a href="{{ google_login_url }}">Sign in with Google</a>
  <div class="divider">or use username and password below</div>
</div>
{% endif %}
{{ block.super }}
{% endblock %}
