<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Documentation{% endblock %} — CCD Orphanage Portal</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #1a1a2e;
            background: #f5f5f5;
            line-height: 1.7;
        }

        /* Top navbar */
        .docs-navbar {
            background: #982b2e;
            color: white;
            padding: 0.85rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .docs-navbar .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: white;
        }
        .docs-navbar .brand img { height: 32px; }
        .docs-navbar .brand span { font-size: 1.1rem; font-weight: 600; }
        .docs-navbar nav { display: flex; gap: 0.25rem; }
        .docs-navbar nav a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            transition: all 0.15s;
        }
        .docs-navbar nav a:hover { background: rgba(255,255,255,0.15); color: white; }
        .docs-navbar nav a.active { background: rgba(255,255,255,0.2); color: white; font-weight: 600; }

        /* Layout: sidebar + content */
        .docs-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            max-width: 1400px;
            margin: 0 auto;
            min-height: calc(100vh - 52px);
        }

        /* Sidebar / Table of Contents */
        .docs-sidebar {
            background: white;
            border-right: 1px solid #e5e7eb;
            padding: 1.5rem 0;
            position: sticky;
            top: 52px;
            height: calc(100vh - 52px);
            overflow-y: auto;
        }
        .docs-sidebar h3 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #9ca3af;
            padding: 0.5rem 1.5rem;
            margin-top: 0.75rem;
        }
        .docs-sidebar a {
            display: block;
            padding: 0.4rem 1.5rem;
            color: #4b5563;
            text-decoration: none;
            font-size: 0.85rem;
            border-left: 3px solid transparent;
            transition: all 0.15s;
        }
        .docs-sidebar a:hover {
            background: #fdf2f2;
            color: #982b2e;
            border-left-color: #f9cccf;
        }
        .docs-sidebar a.active {
            background: #fdf2f2;
            color: #982b2e;
            font-weight: 600;
            border-left-color: #982b2e;
        }
        .docs-sidebar .back-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            margin-bottom: 0.5rem;
            color: #982b2e;
            font-weight: 600;
            font-size: 0.85rem;
            border-bottom: 1px solid #e5e7eb;
        }
        .docs-sidebar .back-link:hover { background: #fdf2f2; }

        /* Main content */
        .docs-content {
            padding: 2.5rem 3rem;
            max-width: 900px;
        }
        .docs-content h1 {
            font-size: 2rem;
            color: #982b2e;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        .docs-content .subtitle {
            color: #6b7280;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid #f9cccf;
        }
        .docs-content h2 {
            font-size: 1.4rem;
            color: #1a1a2e;
            margin-top: 2.5rem;
            margin-bottom: 0.75rem;
            padding-bottom: 0.4rem;
            border-bottom: 2px solid #f9cccf;
        }
        .docs-content h3 {
            font-size: 1.1rem;
            color: #374151;
            margin-top: 1.75rem;
            margin-bottom: 0.5rem;
        }
        .docs-content p { margin-bottom: 1rem; color: #374151; }
        .docs-content ul, .docs-content ol {
            margin-bottom: 1rem;
            padding-left: 1.5rem;
        }
        .docs-content li { margin-bottom: 0.4rem; color: #374151; }

        /* Tables */
        .docs-content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .docs-content th {
            text-align: left;
            padding: 0.65rem 1rem;
            background: #fdf2f2;
            color: #982b2e;
            font-weight: 600;
            border-bottom: 2px solid #f9cccf;
        }
        .docs-content td {
            padding: 0.65rem 1rem;
            border-bottom: 1px solid #e5e7eb;
        }
        .docs-content tr:hover td { background: #fdf8f8; }

        /* Code blocks */
        .docs-content code {
            background: #f3f4f6;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-size: 0.85em;
            color: #982b2e;
        }
        .docs-content pre {
            background: #1a1a2e;
            color: #e5e7eb;
            padding: 1rem 1.25rem;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            line-height: 1.5;
        }
        .docs-content pre code {
            background: none;
            color: inherit;
            padding: 0;
        }

        /* Callout boxes */
        .callout {
            padding: 1rem 1.25rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .callout-info {
            background: #eff6ff;
            border-left: 4px solid #3b82f6;
            color: #1e40af;
        }
        .callout-warning {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            color: #92400e;
        }
        .callout-danger {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
            color: #991b1b;
        }
        .callout-success {
            background: #f0fdf4;
            border-left: 4px solid #22c55e;
            color: #166534;
        }
        .callout strong { display: block; margin-bottom: 0.25rem; }

        /* Flow diagram */
        .flow-diagram {
            background: white;
            border: 2px solid #f9cccf;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
        }
        .flow-steps {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .flow-step {
            background: #fdf2f2;
            border: 2px solid #982b2e;
            border-radius: 10px;
            padding: 0.75rem 1.25rem;
            font-weight: 600;
            color: #982b2e;
        }
        .flow-arrow { color: #982b2e; font-size: 1.5rem; font-weight: 700; }

        /* Quick reference card */
        .ref-card {
            background: white;
            border: 2px solid #982b2e;
            border-radius: 12px;
            padding: 1.5rem 2rem;
            margin-bottom: 1.5rem;
        }
        .ref-card h4 {
            color: #982b2e;
            margin-bottom: 0.75rem;
            font-size: 1rem;
        }

        /* Category grid */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .category-chip {
            background: #fdf2f2;
            border: 1px solid #f9cccf;
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: #982b2e;
        }

        /* Steps */
        .step {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.25rem;
            align-items: flex-start;
        }
        .step-num {
            background: #982b2e;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        .step-body { flex: 1; }
        .step-body strong { display: block; margin-bottom: 0.25rem; }

        /* Checklist */
        .checklist { list-style: none; padding-left: 0; }
        .checklist li {
            padding: 0.4rem 0;
            padding-left: 1.75rem;
            position: relative;
        }
        .checklist li::before {
            content: "\2610";
            position: absolute;
            left: 0;
            color: #982b2e;
            font-size: 1.1rem;
        }

        /* Mobile hamburger toggle */
        .sidebar-toggle {
            display: none;
            background: #982b2e;
            color: white;
            border: none;
            padding: 0.6rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            margin: 1rem;
            width: calc(100% - 2rem);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .docs-layout { grid-template-columns: 1fr; }
            .docs-sidebar {
                position: relative;
                top: 0;
                height: auto;
                border-right: none;
                border-bottom: 1px solid #e5e7eb;
                display: none;
            }
            .docs-sidebar.open { display: block; }
            .sidebar-toggle { display: block; }
            .docs-content { padding: 1.5rem 1rem; }
            .docs-content h1 { font-size: 1.5rem; }
            .docs-navbar { padding: 0.75rem 1rem; }
            .docs-navbar nav { gap: 0; }
            .docs-navbar nav a { font-size: 0.8rem; padding: 0.3rem 0.5rem; }
            .flow-steps { flex-direction: column; }
            .flow-arrow { transform: rotate(90deg); }
        }
        @media (max-width: 480px) {
            .docs-navbar { flex-direction: column; gap: 0.5rem; }
            .docs-navbar nav { flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>
    <header class="docs-navbar">
        <a class="brand" href="/admin/">
            <img src="/static/img/ccd-logo-red.svg" alt="CCD" onerror="this.style.display='none'">
            <span>CCD Documentation</span>
        </a>
        <nav>
            <a href="{% url 'docs:user-manual' %}" class="{% block nav_manual %}{% endblock %}">User Manual</a>
            <a href="{% url 'docs:onboarding' %}" class="{% block nav_onboarding %}{% endblock %}">Onboarding</a>
            <a href="{% url 'docs:troubleshooting' %}" class="{% block nav_troubleshooting %}{% endblock %}">Troubleshooting</a>
            <a href="/reports/dashboard/">Dashboard</a>
            <a href="/admin/">Admin</a>
        </nav>
    </header>

    <button class="sidebar-toggle" onclick="document.querySelector('.docs-sidebar').classList.toggle('open')">
        Table of Contents
    </button>

    <div class="docs-layout">
        <aside class="docs-sidebar">
            <a class="back-link" href="/admin/">&#8592; Back to Admin</a>
            {% block sidebar %}{% endblock %}
        </aside>
        <main class="docs-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        // Highlight active sidebar link on scroll
        document.addEventListener('DOMContentLoaded', function() {
            const links = document.querySelectorAll('.docs-sidebar a[href^="#"]');
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        links.forEach(l => l.classList.remove('active'));
                        const link = document.querySelector('.docs-sidebar a[href="#' + entry.target.id + '"]');
                        if (link) link.classList.add('active');
                    }
                });
            }, { rootMargin: '-80px 0px -60% 0px' });
            document.querySelectorAll('h2[id], h3[id]').forEach(el => observer.observe(el));
        });
    </script>
</body>
</html>
