{% extends "reports/base_report.html" %}
{% block title %}Monthly Summary — CCD Reports{% endblock %}

{% block content %}
<div class="card">
    <h2>Monthly Expense Summary</h2>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="get">
        <div class="form-row">
            <div class="form-group">
                <label for="site">Site</label>
                <select name="site" id="site" required>
                    <option value="">Select site...</option>
                    {% for s in sites %}
                    <option value="{{ s.id }}">{{ s.name }} ({{ s.country }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="year">Year</label>
                <select name="year" id="year" required>
                    {% for y in "01234"|make_list %}
                    <option value="{{ current_year|add:y|add:"-4" }}"{% if forloop.counter == 5 %} selected{% endif %}>{{ current_year|add:y|add:"-4" }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="month">Month</label>
                <select name="month" id="month" required>
                    <option value="1">January</option>
                    <option value="2">February</option>
                    <option value="3">March</option>
                    <option value="4">April</option>
                    <option value="5">May</option>
                    <option value="6">June</option>
                    <option value="7">July</option>
                    <option value="8">August</option>
                    <option value="9">September</option>
                    <option value="10">October</option>
                    <option value="11">November</option>
                    <option value="12">December</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">View Report</button>
        </div>
    </form>
</div>
{% endblock %}
